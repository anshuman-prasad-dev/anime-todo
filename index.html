<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Todo ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sakura particles canvas -->
  <canvas id="sakura-canvas"></canvas>

  <!-- Main container -->
  <div class="app-container">

    <!-- Custom title bar (draggable) -->
    <div class="title-bar" id="title-bar">
      <div class="title-bar-left">
        <span class="title-icon">🌸</span>
        <span class="title-text">Todo List</span>
      </div>
      <div class="title-bar-buttons">
        <button class="title-btn minimize-btn" id="minimize-btn" title="Hide">
          <svg width="10" height="2" viewBox="0 0 10 2"><rect width="10" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="title-btn close-btn" id="close-btn" title="Close">
          <svg width="10" height="10" viewBox="0 0 10 10">
            <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-number" id="total-count">0</span>
        <span class="stat-label">Tasks</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="done-count">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <div class="progress-ring-container">
          <svg class="progress-ring" width="36" height="36">
            <circle class="progress-ring-bg" cx="18" cy="18" r="14" />
            <circle class="progress-ring-fill" id="progress-ring" cx="18" cy="18" r="14" />
          </svg>
          <span class="progress-text" id="progress-text">0%</span>
        </div>
      </div>
    </div>

    <!-- Todo input -->
    <div class="input-container">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="✨ What's the quest today?"
        maxlength="80"
        autocomplete="off"
      />
      <button class="add-btn" id="add-btn" title="Add task">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M9 3V15M3 9H15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="active">Active</button>
      <button class="filter-tab" data-filter="done">Done</button>
    </div>

    <!-- Todo list -->
    <div class="todo-list-wrapper">
      <ul class="todo-list" id="todo-list">
        <!-- Tasks rendered by JS -->
      </ul>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎌</div>
        <p>No quests yet!</p>
        <span>Add your first task above ~</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="clear-done-btn" id="clear-done-btn">🗑️ Clear done</button>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
